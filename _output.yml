bookdown::gitbook:
  split_bib: no
  split_by: chapter
  config:
    toc:
      collapse: section
      before: |
        <li><a href="./index.html">Digitale Systeeemrapportage Wadden</a></li>
      after: |
        <li><a href="https://bookdown.org/yihui/bookdown/" target="blank">Published with bookdown</a></li>
    toc_float:
      collapsed: false
      smooth_scroll: false
  includes:
    # before_body: navbar/navbar.html
    in_header: clickandzoom.html

bookdown::bs4_book:
  # theme:
  #   primary: "#982a31"
  #   fg: "#2b2121"
  #   bg: "#ffffff"
  includes:
    before_body: navbar/navbar.html
    in_header: clickandzoom_bs4.html
  css: ["navbar/navbar.css", "style/deltares_bs4.css"]

bookdown::pdf_book:
  extra_dependencies: ["flafter"]
  keep_tex: true
  pandoc_args: --top-level-division=chapter
  includes:
    in_header: preamble.tex
  template: deltares-report-template.tex
  latex_engine: pdflatex
  # citation_package: natbib # niet in combinatie met Deltares-template
